<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - GameHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="index.html" class="material-icons back-icon" style="color: white; text-decoration: none;">arrow_back</a>
                <h1 class="app-title">Administración</h1>
            </div>
        </header>

        <main class="content-area">
            <div class="admin-actions">
                <button class="btn-primary" id="btn-new-user">
                    <span class="material-icons">person_add</span>
                    Nuevo Usuario
                </button>
            </div>

            <div class="user-list animated fadeInUp" id="user-list">
                <div class="loader">Cargando usuarios...</div>
            </div>
        </main>
    </div>

    <!-- Modals (Reuse index.html logic) -->
    <div class="modal-overlay" id="register-modal">
        <div class="modal-content">
            <h2>Crear Usuario</h2>
            <div class="form-group"><label>Usuario</label><input type="text" id="reg-user"></div>
            <div class="form-group"><label>Contraseña</label><input type="password" id="reg-pass"></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-primary" style="background: #eee; color: #333;" onclick="document.getElementById('register-modal').style.display='none'">CANCELAR</button>
                <button class="btn-primary" id="btn-do-reg">CREAR</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/ui-manager.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.isAdmin()) {
                document.body.innerHTML = '';
                UIManager.alert('Acceso Denegado', 'Solo administradores pueden ver esta página', 'error')
                    .then(() => window.location.href = 'index.html');
                return;
            }

            const list = document.getElementById('user-list');

            async function loadUsers() {
                list.innerHTML = '<div class="loader">Cargando...</div>';
                const { data, error } = await window.appConfig.supabase
                    .from('app_users')
                    .select('*');

                if (error) {
                    list.innerHTML = '<p class="error">Error al cargar usuarios</p>';
                    return;
                }

                list.innerHTML = data.map(u => `
                    <div class="user-item">
                        <span class="material-icons">account_circle</span>
                        <div class="user-info">
                            <strong>${u.username}</strong>
                            <span>Rol: ${u.role}</span>
                        </div>
                        <span class="date">Desde: ${new Date(u.created_at).toLocaleDateString()}</span>
                    </div>
                `).join('');
            }

            document.getElementById('btn-new-user').onclick = () => {
                document.getElementById('register-modal').style.display = 'flex';
            };

            document.getElementById('btn-do-reg').onclick = async () => {
                const user = document.getElementById('reg-user').value;
                const pass = document.getElementById('reg-pass').value;
                try {
                    await Auth.register(user, pass);
                    UIManager.alert('Éxito', 'Usuario creado correctamente', 'success');
                    document.getElementById('register-modal').style.display = 'none';
                    loadUsers();
                } catch (e) {
                    UIManager.alert('Error', e.message, 'error');
                }
            };

            loadUsers();
        });
    </script>
</body>
</html>
