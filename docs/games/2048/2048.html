<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - GameHub</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .game-area { padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .grid-container {
            background: #bbada0;
            border-radius: 6px;
            width: 320px;
            height: 320px;
            padding: 10px;
            display: grid;
            gap: 10px;
            margin: 15px auto;
            touch-action: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .tile {
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: transform 0.1s, background-color 0.2s;
        }
        .tutorial-box {
            background: #eee;
            padding: 15px;
            border-radius: 12px;
            margin: 10px;
            font-size: 14px;
            text-align: center;
            border-left: 5px solid var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="../../index.html" class="material-icons back-icon">arrow_back</a>
                <h1 class="app-title">2048</h1>
            </div>
        </header>

        <div id="splash" class="splash-screen">
            <span class="material-icons" style="font-size: 80px; color: var(--primary-color); margin-bottom: 20px;">filter_4</span>
            <h2>2048</h2>
            <p style="color: #666; margin-bottom: 30px;">Desliza los azulejos para combinarlos.<br>¡Suma hasta llegar al 2048!</p>
            <button class="btn-premium" onclick="startGame()">COMENZAR JUEGO</button>
        </div>

        <main class="game-area" id="main-game" style="display: none;">
            <div class="tutorial-box">
                <b>Cómo jugar:</b> Desliza tu dedo en cualquier dirección para mover los números. Cuando dos del mismo valor chocan, se suman.
            </div>
            <div style="font-weight: bold; font-size: 1.2rem; color: #444;">Puntos: <span id="score">0</span></div>
            <div class="grid-container" id="board"></div>
            <button class="btn-premium" onclick="initGame()" style="padding: 10px 30px;">REINICIAR</button>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/ui-manager.js"></script>
    <script src="../../js/game-manager.js"></script>
    <script src="script.js"></script>
    <script>
        function startGame() {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('main-game').style.display = 'flex';
            initGame();
        }
    </script>
</body>
</html>
