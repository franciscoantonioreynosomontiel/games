<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - GameHub</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .instructions {
            background: #eee;
            padding: 10px;
            border-radius: 8px;
            margin: 10px;
            font-size: 14px;
            text-align: center;
        }
        .grid-container {
            position: relative;
            background: #bbada0;
            border-radius: 6px;
            width: 300px;
            height: 300px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            margin: 20px auto;
            touch-action: none;
        }
        .tile {
            width: 100%;
            height: 100%;
            background: rgba(238, 228, 218, 0.35);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #776e65;
        }
        .tile[data-value="2"] { background: #eee4da; }
        .tile[data-value="4"] { background: #ede0c8; }
        .tile[data-value="8"] { background: #f2b179; color: #f9f6f2; }
        .tile[data-value="16"] { background: #f59563; color: #f9f6f2; }
        .tile[data-value="32"] { background: #f67c5f; color: #f9f6f2; }
        .tile[data-value="64"] { background: #f65e3b; color: #f9f6f2; }
        .tile[data-value="128"] { background: #edcf72; color: #f9f6f2; font-size: 20px; }
        .tile[data-value="256"] { background: #edcc61; color: #f9f6f2; font-size: 20px; }
        .tile[data-value="512"] { background: #edc850; color: #f9f6f2; font-size: 20px; }
        .tile[data-value="1024"] { background: #edc53f; color: #f9f6f2; font-size: 16px; }
        .tile[data-value="2048"] { background: #edc22e; color: #f9f6f2; font-size: 16px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="../../index.html" class="material-icons back-icon">arrow_back</a>
                <h1 class="app-title">2048</h1>
            </div>
        </header>

        <main class="game-area">
            <div class="instructions">
                Desliza (o usa flechas) para combinar los números. ¡Llega al 2048!
            </div>
            <div class="score-container" style="text-align: center; margin-top: 10px;">
                <div class="score-box" style="font-size: 1.2rem; font-weight: bold;">Puntos: <span id="score">0</span></div>
                <button id="reset-btn" class="btn-primary" style="width: auto; padding: 8px 20px; margin-top: 10px;">Nuevo Juego</button>
            </div>

            <div class="grid-container" id="board"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/ui-manager.js"></script>
    <script src="../../js/game-manager.js"></script>
    <script src="script.js"></script>
</body>
</html>
