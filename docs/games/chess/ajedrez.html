<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../lib/chessboard.min.css">
    <link href="../../lib/fonts/material-icons.css" rel="stylesheet">
    <style>
        .game-area { padding: 10px; display: flex; flex-direction: column; align-items: center; }
        #board { width: 340px; max-width: 95vw; margin: 15px 0; border: 4px solid #333; border-radius: 4px; overflow: hidden; }
        .controls { width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 10px; }
        .status-box { background: #eee; padding: 10px; border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 5px; min-height: 40px; border-left: 5px solid var(--primary-color); }
        .highlight-check { box-shadow: inset 0 0 5px 5px red !important; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="../../index.html" class="material-icons back-icon">arrow_back</a>
                <h1 class="app-title">Ajedrez</h1>
            </div>
        </header>

        <div id="splash" class="splash-screen">
            <span class="material-icons" style="font-size: 80px; color: var(--primary-color); margin-bottom: 20px;">military_tech</span>
            <h2>Dificultad</h2>
            <div class="level-grid" id="diff-grid">
                <!-- Injected -->
            </div>
            <button class="btn-premium" style="background: #03dac6; color: black; margin-top: 20px; width: 280px;" onclick="startMode('pvp')">2 JUGADORES</button>
        </div>

        <main class="game-area" id="main-game" style="display: none;">
            <div id="status" class="status-box">Turno: Blanco</div>
            <div id="board"></div>
            <div class="controls">
                <button class="btn-premium" id="reset-btn">REINICIAR</button>
                <button class="btn-premium" id="undo-btn" style="background: #eee; color: #333;">DESHACER</button>
            </div>
        </main>
    </div>

    <script src="../../lib/jquery.min.js"></script>
    <script src="../../lib/chessboard.min.js"></script>
    <script src="../../lib/chess.min.js"></script>
    <script src="../../lib/supabase.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/ui-manager.js"></script>
    <script src="../../js/game-manager.js"></script>
    <script src="script.js"></script>
    <script>
        GameManager.currentGame = 'chess';
        const modes = ['easy', 'medium', 'hard'];
        const names = {'easy': 'Fácil (IA)', 'medium': 'Medio (IA)', 'hard': 'Difícil (IA)'};
        const grid = document.getElementById('diff-grid');
        modes.forEach(m => {
            const isDone = GameManager.isCompleted(m);
            const btn = document.createElement('button');
            btn.className = 'btn-premium';
            btn.innerHTML = `${names[m]}${isDone ? ' <span class="material-icons" style="font-size: 16px; vertical-align: middle;">star</span>' : ''}`;
            btn.onclick = () => startMode(m);
            grid.appendChild(btn);
        });

        function startMode(m) {
            gameMode = (m === 'pvp') ? 'pvp' : 'pva';
            difficulty = m;
            document.getElementById('splash').style.display = 'none';
            document.getElementById('main-game').style.display = 'flex';
            GameManager.setGame('chess', false, m.toUpperCase());
            initGame();
        }
    </script>
</body>
</html>
