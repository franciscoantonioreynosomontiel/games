<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajedrez - GameHub</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="../../index.html" class="material-icons back-icon">arrow_back</a>
                <h1 class="app-title">Ajedrez</h1>
            </div>
        </header>

        <main class="game-area">
            <div class="game-controls">
                <select id="game-mode">
                    <option value="pvp">2 Jugadores</option>
                    <option value="pva">Vs IA</option>
                </select>
                <select id="difficulty" style="display:none;">
                    <option value="easy">Fácil</option>
                    <option value="medium">Medio</option>
                    <option value="hard">Difícil</option>
                </select>
            </div>

            <div id="board" style="width: 100%; max-width: 400px;"></div>

            <div class="status-panel">
                <p id="status">Blanco para mover</p>
                <p id="fen" style="display:none;"></p>
            </div>

            <div class="action-buttons">
                <button class="btn-reset" id="reset-btn">Reiniciar</button>
                <button class="btn-undo" id="undo-btn">Deshacer</button>
            </div>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
