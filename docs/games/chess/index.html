<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajedrez - GameHub</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .game-area { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #myBoard { width: 320px; max-width: 90vw; margin: 20px 0; }
        .controls { width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 10px; }
        .status-box { background: #eee; padding: 10px; border-radius: 8px; font-weight: 500; text-align: center; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="../../index.html" class="material-icons back-icon">arrow_back</a>
                <h1 class="app-title">Ajedrez</h1>
            </div>
        </header>

        <!-- Splash -->
        <div id="splash" class="splash-screen">
            <span class="material-icons" style="font-size: 80px; color: var(--primary-color); margin-bottom: 20px;">military_tech</span>
            <h2>Ajedrez</h2>
            <div class="level-grid">
                <button class="btn-premium" onclick="startMode('easy')">Fácil (IA)</button>
                <button class="btn-premium" onclick="startMode('medium')">Medio (IA)</button>
                <button class="btn-premium" onclick="startMode('hard')">Difícil (IA)</button>
                <button class="btn-premium" style="background: #03dac6; color: black;" onclick="startMode('pvp')">2 Jugadores</button>
            </div>
        </div>

        <main class="game-area" id="main-game" style="display: none;">
            <div id="status" class="status-box">Turno: Blancas</div>
            <div id="myBoard"></div>
            <div class="controls">
                <button class="btn-premium" onclick="location.reload()">REINICIAR</button>
            </div>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/ui-manager.js"></script>
    <script src="../../js/game-manager.js"></script>
    <script src="script.js"></script>
    <script>
        function startMode(m) {
            gameMode = m;
            document.getElementById('splash').style.display = 'none';
            document.getElementById('main-game').style.display = 'flex';
            initGame();
        }
    </script>
</body>
</html>
