<!DOCTYPE html>
<html lang="es">
<head>

    <title></title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../lib/chessboard.min.css">
    <link href="../../lib/fonts/material-icons.css" rel="stylesheet">
    <style>
        .game-area { padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 80vh; }
        #board-wrapper { width: 340px; height: 340px; margin: 15px 0; border: 4px solid #333; border-radius: 8px; overflow: hidden; background: #dee3e6; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative; }
        #board { position: absolute; bottom: 0; left: 0; width: 100%; }

        .controls { width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .status-box { background: #eee; padding: 10px; border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 10px; min-height: 40px; border-left: 5px solid var(--primary-color); width: 100%; max-width: 350px; }
        .instruction-box { background: #fff8e1; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 10px; border: 2px solid #ffe082; color: #856404; width: 100%; max-width: 350px; font-weight: 800; font-size: 1.4rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .target-card { background: white; border: 3px dashed #ff9800; border-radius: 12px; padding: 15px; margin-bottom: 15px; display: none; flex-direction: column; align-items: center; width: 100%; max-width: 350px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .target-card h3 { font-size: 16px; color: #ff9800; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

        #target-wrapper { width: 180px; height: 180px; border: 2px solid #333; overflow: hidden; position: relative; background: #f0f0f0; }
        #target-board { position: absolute; bottom: 0; left: 0; width: 100%; }

        .highlight-move { background-color: rgba(0, 255, 0, 0.5) !important; }
        .highlight-selected { background-color: rgba(255, 255, 0, 0.5) !important; }
        .highlight-invalid { background-color: rgba(255, 0, 0, 0.5) !important; }
        .highlight-check { box-shadow: inset 0 0 5px 5px red !important; }
        .highlight-target { background-color: rgba(255, 0, 0, 0.4) !important; border: 4px solid #f44336 !important; }
    </style>
</head>

    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="ajedrez.html" class="material-icons back-icon">arrow_back</a>
                <h1 class="app-title"></h1>
            </div>
        </header>

        <div id="splash" class="splash-screen">
            <span class="material-icons" style="font-size: 80px; color: #ff9800; margin-bottom: 20px;">extension</span>
            <h2>PUZZLES</h2>
            <div id="levels-grid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 25px; max-height: 350px; overflow-y: auto; padding: 5px; width: 100%; max-width: 350px;">
                <!-- Injected -->
            </div>
        </div>

        <main class="game-area" id="main-game" style="display: none;">
            <div id="instruction" class="instruction-box">Cargando...</div>

            <div id="target-card" class="target-card">
                <h3>OBJETIVO</h3>
                <div id="target-wrapper">
                    <div id="target-board"></div>
                </div>
                <div id="moves-left" style="font-size: 18px; margin-top: 12px; font-weight: 900; color: #d32f2f; background: #ffebee; padding: 5px 15px; border-radius: 20px;">MOVIMIENTOS: 0</div>
            </div>

            <div id="status" class="status-box">Nivel</div>
            <div id="board-wrapper">
                <div id="board"></div>
            </div>
            <div class="controls">
                <button class="btn-premium" onclick="location.reload()" style="background: #eee; color: #333;">SALIR AL MENÚ</button>
            </div>
        </main>
    </div>

            btn.style.cssText = `padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: ${isLocked ? '#f5f5f5' : (isDone ? '#e8f5e9' : 'white')}; cursor: ${isLocked ? 'default' : 'pointer'}; position: relative; font-weight: bold; color: ${isLocked ? '#999' : '#333'}`;
            btn.innerHTML = `${i}${isLocked ? '<span class="material-icons" style="font-size: 12px; position: absolute; top: 2px; right: 2px;">lock</span>' : ''}${isDone ? '<span class="material-icons" style="font-size: 12px; position: absolute; bottom: 2px; right: 2px; color: #4caf50;">star</span>' : ''}`;
            if (!isLocked) btn.onclick = () => startLevel(i);
            grid.appendChild(btn);
        }

        if (sessionStorage.getItem('autostart_chess_puzzles') === 'true') {
            sessionStorage.removeItem('autostart_chess_puzzles');
            startLevel(GameManager.currentLevel);

        function initPuzzle() {
            currentPuzzle = puzzles[GameManager.currentLevel];
            if (!currentPuzzle) {
                UIManager.alert('Fin', '¡Has completado todos los puzzles!', 'success');
                return;
            }

            movesMade = 0;
            document.getElementById('instruction').innerText = currentPuzzle.task;
            document.getElementById('status').innerText = 'Nivel ' + GameManager.currentLevel;

            game.load(currentPuzzle.fen);
            const orientation = currentPuzzle.turn === 'b' ? 'black' : 'white';

            const targetCard = document.getElementById('target-card');
            const targetWrapper = document.getElementById('target-wrapper');
            const targetBoardEl = document.getElementById('target-board');

            if (currentPuzzle.type === 'match') {
                targetCard.style.display = 'flex';
                document.getElementById('moves-left').innerText = `MOVIMIENTOS: 0`;
                if (targetBoard) targetBoard.destroy();

                const cropSize = parseInt(currentPuzzle.crop[0]);
                const visibleSize = 180;
                const fullBoardSize = (visibleSize / cropSize) * 8;

                targetBoardEl.style.width = fullBoardSize + 'px';

                setTimeout(() => {
                    targetBoard = Chessboard('target-board', {
                        position: currentPuzzle.goal,
                        showNotation: false,
                        pieceTheme: '../../assets/chess/{piece}.png'
                    });
                    setTimeout(() => targetBoard.resize(), 50);
                }, 100);
            } else {
                targetCard.style.display = 'none';
            }

            if (board) board.destroy();

            const boardWrapper = document.getElementById('board-wrapper');
            const boardEl = document.getElementById('board');

            const cropSizeMain = currentPuzzle.crop ? parseInt(currentPuzzle.crop[0]) : 8;
            const visibleSizeMain = Math.min(window.innerWidth * 0.9, 340);
            const fullBoardSizeMain = (visibleSizeMain / cropSizeMain) * 8;

            boardWrapper.style.width = visibleSizeMain + 'px';
            boardWrapper.style.height = visibleSizeMain + 'px';
            boardEl.style.width = fullBoardSizeMain + 'px';

            requestAnimationFrame(() => {
                board = Chessboard('board', {
                    draggable: false,
                    position: currentPuzzle.fen,
                    orientation: orientation,
                    pieceTheme: '../../assets/chess/{piece}.png'
                });

                $('#board').off('click').on('click', '.square-55d63', function() {
                    const square = $(this).attr('data-square') || $(this).closest('.square-55d63').attr('data-square');
                    onSquareClick(square);
                });

                setTimeout(() => {
                    board.resize();
                    highlightTargetSquare();
                }, 200);
            });
        }

        function highlightTargetSquare() {
            if (currentPuzzle.type === 'reach' && currentPuzzle.target) {
                $(`.square-${currentPuzzle.target}`).addClass('highlight-target');
            }
        }

        function removeHighlights() {
            $('.square-55d63').removeClass('highlight-move highlight-selected highlight-invalid highlight-check');
            highlightTargetSquare();
        }

        function onSquareClick(square) {
            if (!square) return;
            const piece = game.get(square);

            if (selectedSquare) {
                if (selectedSquare === square) {
                    selectedSquare = null;
                    removeHighlights();
                    return;
                }

                const moveAttempt = { from: selectedSquare, to: square, promotion: 'q' };
                const move = game.move(moveAttempt);

                if (move) {
                    movesMade++;

                    // Force turn back to player if it's a maneuver puzzle
                    if (currentPuzzle.type === 'match' || currentPuzzle.type === 'reach' || currentPuzzle.type === 'hunt') {
                        const fenParts = game.fen().split(' ');
                        fenParts[1] = currentPuzzle.turn || 'w';
                        game.load(fenParts.join(' '));
                    }

                    board.position(game.fen());
                    selectedSquare = null;
                    removeHighlights();

                    document.getElementById('moves-left').innerText = `Movimientos: ${movesMade}`;

                    if (currentPuzzle.type === 'match') {
                        checkMatchWin();
                    } else if (currentPuzzle.type === 'hunt') {
                        checkHuntWin();
                    } else if (currentPuzzle.type === 'reach') {
                        checkReachWin(square);
                    } else if (currentPuzzle.type === 'mate') {
                        if (game.in_checkmate()) {
                            setTimeout(() => GameManager.showResult('win', '¡Jaque Mate!'), 500);
                        } else if (currentPuzzle.sol && (move.san === currentPuzzle.sol || (move.from+move.to) === currentPuzzle.sol)) {
                            setTimeout(() => GameManager.showResult('win', '¡Excelente!'), 500);
                        }
                    }

                    // Respond for player if it's a sequence mate puzzle (not implemented for simplicity, usually Mate-in-1 or Mate-in-X but user wants minigames)
                } else {
                    if (!piece || piece.color !== game.turn()) {
                        $('.square-' + square).addClass('highlight-invalid');
                        setTimeout(() => $('.square-' + square).removeClass('highlight-invalid'), 500);
                    } else {
                        selectPiece(square);
                    }
                }
            } else {
                if (piece && piece.color === game.turn()) {
                    selectPiece(square);
                }
            }
        }

        function checkHuntWin() {
            const boardData = game.board();
            let blackPieces = 0;
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const p = boardData[row][col];
                    if (p && p.color === 'b' && p.type !== 'k') blackPieces++;
                }
            }
            if (blackPieces === 0) {
                setTimeout(() => GameManager.showResult('win', '¡Caza completada!'), 500);
            }
        }

        function selectPiece(square) {
            selectedSquare = square;
            removeHighlights();
            $('.square-' + square).addClass('highlight-selected');

            if (currentPuzzle.type === 'match') {
                // In sandbox mode, theoretically anything can move anywhere if we want to allow free placement
                // For simplicity, let's just highlight the selection.
                // Any click on another square will move the piece there in the logic above.
            } else {
                const moves = game.moves({ square: square, verbose: true });
                moves.forEach(m => $('.square-' + m.to).addClass('highlight-move'));
            }
        }

        function checkMatchWin() {
            const currentPieces = game.fen().split(' ')[0];
            const goalPieces = currentPuzzle.goal.split(' ')[0];

            if (currentPieces === goalPieces) {
                selectedSquare = null;
                removeHighlights();
                setTimeout(() => {
                    GameManager.showResult('win', '¡Completado!');
                }, 500);
            }
        }

        function checkReachWin(square) {
            if (currentPuzzle.type === 'reach' && square === currentPuzzle.target) {
                selectedSquare = null;
                removeHighlights();
                setTimeout(() => {
                    GameManager.showResult('win', '¡Objetivo alcanzado!');
                }, 500);
            }
        }
    </script>
</body>
</html>
