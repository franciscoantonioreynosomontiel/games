<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahorcado - GameHub</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="../../index.html" class="material-icons back-icon">arrow_back</a>
                <h1 class="app-title">Ahorcado</h1>
            </div>
        </header>

        <main class="game-area">
            <div class="game-info">
                <div class="info-box">Vidas: <span id="lives">6</span></div>
                <button id="reset-btn">Nuevo</button>
            </div>

            <div class="hangman-display">
                <svg width="150" height="150" viewBox="0 0 150 150" class="hangman-svg">
                    <!-- Gallows -->
                    <line x1="20" y1="140" x2="130" y2="140" />
                    <line x1="40" y1="140" x2="40" y2="20" />
                    <line x1="40" y1="20" x2="100" y2="20" />
                    <line x1="100" y1="20" x2="100" y2="40" />
                    <!-- Body parts -->
                    <circle cx="100" cy="50" r="10" class="part" id="head" />
                    <line x1="100" y1="60" x2="100" y2="100" class="part" id="body" />
                    <line x1="100" y1="70" x2="80" y2="90" class="part" id="left-arm" />
                    <line x1="100" y1="70" x2="120" y2="90" class="part" id="right-arm" />
                    <line x1="100" y1="100" x2="80" y2="130" class="part" id="left-leg" />
                    <line x1="100" y1="100" x2="120" y2="130" class="part" id="right-leg" />
                </svg>
            </div>

            <div class="word-display" id="word"></div>

            <div class="keyboard" id="keyboard"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
