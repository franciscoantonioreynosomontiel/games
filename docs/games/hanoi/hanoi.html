<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torres de Hanoi - GameHub</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .game-area { display: flex; flex-direction: column; align-items: center; padding: 20px; touch-action: none; }
        .hanoi-board {
            display: flex; justify-content: space-around; align-items: flex-end;
            width: 95%; max-width: 500px; background: #f0f0f0;
            border-bottom: 15px solid #5d4037; border-radius: 12px;
            margin: 40px 0; padding: 0 10px; min-height: 250px; position: relative;
        }
        .pole {
            width: 30%; height: 200px; position: relative;
            display: flex; flex-direction: column-reverse; align-items: center;
            cursor: pointer; transition: all 0.2s; z-index: 1;
        }
        /* The actual visual pole */
        .pole::before {
            content: ''; position: absolute; bottom: 0; left: 50%;
            width: 12px; height: 100%; background: #795548;
            transform: translateX(-50%); border-radius: 6px 6px 0 0;
            transition: background 0.3s;
        }
        .pole.selected::before { background: var(--primary-color); box-shadow: 0 0 15px var(--primary-color); }

        .disk {
            height: 30px; border-radius: 15px; /* Pill shape */
            background: var(--primary-color); border: 2px solid rgba(255,255,255,0.3);
            position: absolute; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            z-index: 2;
        }
        /* Color mapping */
        .disk[data-size="1"] { background: #f44336; }
        .disk[data-size="2"] { background: #e91e63; }
        .disk[data-size="3"] { background: #9c27b0; }
        .disk[data-size="4"] { background: #3f51b5; }
        .disk[data-size="5"] { background: #2196f3; }
        .disk[data-size="6"] { background: #009688; }
        .disk[data-size="7"] { background: #4caf50; }
        .disk[data-size="8"] { background: #ff9800; }
        .disk[data-size="9"] { background: #795548; }

        .stats { margin-bottom: 15px; font-size: 1.2rem; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="../../index.html" class="material-icons back-icon">arrow_back</a>
                <h1 class="app-title">Torres de Hanoi</h1>
            </div>
        </header>

        <div id="splash" class="splash-screen">
            <span class="material-icons" style="font-size: 80px; color: var(--primary-color); margin-bottom: 20px;">layers</span>
            <h2>Niveles</h2>
            <div id="levels-grid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 25px; max-height: 350px; overflow-y: auto; padding: 5px; width: 100%; max-width: 350px;"></div>
            <p style="color: #666; font-size: 14px;">Arrastra los discos al último poste.</p>
        </div>

        <main class="game-area" id="main-game" style="display: none;">
            <div class="stats">Movimientos: <span id="moves">0</span></div>
            <div class="hanoi-board" id="board-container">
                <div class="pole" id="pole-0"></div>
                <div class="pole" id="pole-1"></div>
                <div class="pole" id="pole-2"></div>
            </div>
            <button id="reset-btn" class="btn-premium" style="width: auto; padding: 12px 40px;">REINICIAR</button>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/ui-manager.js"></script>
    <script src="../../js/game-manager.js"></script>
    <script src="script.js"></script>
    <script>
        const grid = document.getElementById('levels-grid');
        const unlocked = GameManager.getUnlockedLevel();
        const completed = JSON.parse(localStorage.getItem(`completed_${Auth.currentUser?.username}_hanoi`) || '[]');
        for (let i = 1; i <= 50; i++) {
            const isLocked = i > unlocked;
            const isDone = completed.includes(i);
            const btn = document.createElement('button');
            btn.className = 'lvl-btn-mini';
            btn.style.cssText = `padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: ${isLocked ? '#f5f5f5' : (isDone ? '#e8f5e9' : 'white')}; cursor: ${isLocked ? 'default' : 'pointer'}; position: relative; font-weight: bold; color: ${isLocked ? '#999' : '#333'}`;
            btn.innerHTML = `${i}${isLocked ? '<span class="material-icons" style="font-size: 12px; position: absolute; top: 2px; right: 2px;">lock</span>' : ''}${isDone ? '<span class="material-icons" style="font-size: 12px; position: absolute; bottom: 2px; right: 2px; color: #4caf50;">star</span>' : ''}`;
            if (!isLocked) btn.onclick = () => startGame(i);
            grid.appendChild(btn);
        }

        function startGame(lvl) {
            GameManager.currentLevel = lvl;
            localStorage.setItem(`level_${Auth.currentUser.username}_hanoi`, lvl);
            document.getElementById('splash').style.display = 'none';
            document.getElementById('main-game').style.display = 'flex';
            initHanoi(lvl);
        }
    </script>
</body>
</html>
