<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torres de Hanoi - GameHub</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .game-area { padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 80vh; justify-content: center; }
        .hanoi-container {
            display: flex; justify-content: space-around; width: 100%; max-width: 400px;
            height: 250px; align-items: flex-end; position: relative;
            background: #fdfdfd; border-radius: 15px; padding: 20px 10px;
        }
        .tower {
            width: 30%; height: 100%; display: flex; flex-direction: column-reverse;
            align-items: center; position: relative; cursor: pointer;
        }
        .pole {
            position: absolute; bottom: 0; width: 12px; height: 180px;
            background: #8d6e63; border-radius: 6px 6px 0 0; z-index: 1;
            box-shadow: inset -2px 0 5px rgba(0,0,0,0.2);
        }
        .base {
            position: absolute; bottom: -10px; width: 90%; height: 12px;
            background: #5d4037; border-radius: 6px; z-index: 1;
        }
        .disk {
            height: 22px; border-radius: 11px; z-index: 2; margin-bottom: 2px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.4);
            transition: transform 0.2s, top 0.3s, left 0.3s;
        }
        .disk.dragging { opacity: 0.7; transform: scale(1.1); z-index: 100; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="../../index.html" class="material-icons back-icon">arrow_back</a>
                <h1 class="app-title">Torres de Hanoi</h1>
            </div>
        </header>

        <div id="splash" class="splash-screen">
            <span class="material-icons" style="font-size: 80px; color: var(--primary-color); margin-bottom: 20px;">format_list_numbered</span>
            <h2>Dificultad</h2>
            <div id="diff-grid" style="display: grid; grid-template-columns: 1fr; gap: 12px; width: 100%; max-width: 300px;"></div>
            <p style="font-size: 13px; color: #666; margin-top: 20px;">Mueve todos los discos al tercer palo.<br>Un disco grande no puede ir sobre uno pequeño.</p>
        </div>

        <main class="game-area" id="main-game" style="display: none;">
            <div class="hanoi-container">
                <div class="tower" id="tower1"><div class="pole"></div><div class="base"></div></div>
                <div class="tower" id="tower2"><div class="pole"></div><div class="base"></div></div>
                <div class="tower" id="tower3"><div class="pole"></div><div class="base"></div></div>
            </div>
            <button class="btn-premium" onclick="initGame()" style="margin-top: 40px; padding: 10px 40px;">REINICIAR</button>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/ui-manager.js"></script>
    <script src="../../js/game-manager.js"></script>
    <script src="script.js"></script>
    <script>
        GameManager.currentGame = 'hanoi';
        const grid = document.getElementById('diff-grid');
        const user = Auth.currentUser?.username || 'anon';

        for (let i = 1; i <= 7; i++) {
            const isDone = GameManager.isCompleted(i);
            const btn = document.createElement('button');
            btn.className = 'btn-premium';
            btn.style.cssText = `display: flex; align-items: center; justify-content: center; gap: 10px;`;
            btn.innerHTML = `Dificultad ${i} (${i+2} Discos)${isDone ? '<span class="material-icons">star</span>' : ''}`;
            btn.onclick = () => startGame(i);
            grid.appendChild(btn);
        }

        function startGame(d) {
            GameManager.currentLevel = d;
            document.getElementById('splash').style.display = 'none';
            document.getElementById('main-game').style.display = 'flex';
            initGame();
        }
    </script>
</body>
</html>
