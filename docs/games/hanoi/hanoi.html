<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torres de Hanoi - GameHub</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .hanoi-board {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            width: 90%;
            max-width: 400px;
            background: #eee;
            border-bottom: 8px solid #795548;
            border-radius: 10px;
            margin: 30px 0;
            padding: 0 15px;
            min-height: 150px;
        }
        .pole {
            width: 12px;
            background: #795548;
            position: relative;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pole.selected {
            background: var(--primary-color);
            box-shadow: 0 0 15px var(--primary-color);
        }
        .disk {
            height: 22px;
            border-radius: 11px;
            background: var(--primary-color);
            border: 1px solid rgba(0,0,0,0.1);
            position: absolute;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .disk[data-size="1"] { background: #f44336; }
        .disk[data-size="2"] { background: #2196f3; }
        .disk[data-size="3"] { background: #4caf50; }
        .disk[data-size="4"] { background: #ffeb3b; }
        .disk[data-size="5"] { background: #9c27b0; }
        .disk[data-size="6"] { background: #ff9800; }
        .disk[data-size="7"] { background: #795548; }

        .stats {
            margin-bottom: 10px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="../../index.html" class="material-icons back-icon">arrow_back</a>
                <h1 class="app-title">Torres de Hanoi</h1>
            </div>
        </header>

        <div id="splash" class="splash-screen">
            <span class="material-icons" style="font-size: 80px; color: var(--primary-color); margin-bottom: 20px;">layers</span>
            <h2>Torres de Hanoi</h2>
            <p style="color: #666; margin-bottom: 30px;">Mueve todos los discos a la última torre.<br>Un disco grande no puede estar sobre uno pequeño.</p>
            <div class="level-grid">
                <button class="btn-premium" onclick="startGame(3)">Fácil (3)</button>
                <button class="btn-premium" onclick="startGame(5)">Medio (5)</button>
                <button class="btn-premium" onclick="startGame(7)">Difícil (7)</button>
            </div>
        </div>

        <main class="game-area" id="main-game" style="display: none;">
            <div class="stats">Movimientos: <span id="moves">0</span></div>

            <div class="hanoi-board">
                <div class="pole" id="pole-0"></div>
                <div class="pole" id="pole-1"></div>
                <div class="pole" id="pole-2"></div>
            </div>

            <button id="reset-btn" class="btn-premium">REINICIAR</button>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/ui-manager.js"></script>
    <script src="../../js/game-manager.js"></script>
    <script src="script.js"></script>
    <script>
        function startGame(d) {
            document.getElementById('splash').classList.add('animated', 'fadeOut');
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('main-game').style.display = 'flex';
                document.getElementById('main-game').classList.add('animated', 'fadeInUp');
                initGameWithDisks(d);
            }, 300);
        }
    </script>
</body>
</html>
