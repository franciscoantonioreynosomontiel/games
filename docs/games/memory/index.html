<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria - GameHub</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .game-area { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .board {
            display: grid;
            grid-template-columns: repeat(4, 75px);
            gap: 10px;
            margin: 20px 0;
        }
        .card {
            width: 75px;
            height: 100px;
            perspective: 1000px;
            cursor: pointer;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
        }
        .card-front { background: var(--primary-color); color: white; }
        .card-back { background: white; transform: rotateY(180deg); color: var(--primary-color); }
        .card-back span { font-size: 2rem; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="../../index.html" class="material-icons back-icon">arrow_back</a>
                <h1 class="app-title">Memoria</h1>
            </div>
        </header>

        <!-- Splash -->
        <div id="splash" class="splash-screen">
            <span class="material-icons" style="font-size: 80px; color: var(--primary-color); margin-bottom: 20px;">style</span>
            <h2>Memoria</h2>
            <p style="color: #666; margin-bottom: 30px;">Encuentra todos los pares antes de que se acaben tus vidas.</p>
            <button class="btn-premium" onclick="startGame()">COMENZAR JUEGO</button>
        </div>

        <main class="game-area" id="main-game" style="display: none;">
            <div class="board" id="board"></div>
            <button class="btn-premium" onclick="initGame()">REINICIAR</button>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/ui-manager.js"></script>
    <script src="../../js/game-manager.js"></script>
    <script src="script.js"></script>
    <script>
        function startGame() {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('main-game').style.display = 'flex';
            initGame();
        }
    </script>
</body>
</html>
