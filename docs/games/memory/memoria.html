<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria - GameHub</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .game-area { padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .board { display: grid; grid-template-columns: repeat(4, 80px); gap: 10px; margin: 20px 0; }
        .card { width: 80px; height: 80px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card.matched { visibility: hidden; pointer-events: none; }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card-front { background: var(--primary-color); color: white; }
        .card-back { background: white; transform: rotateY(180deg); color: #333; border: 2px solid var(--primary-color); }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="../../index.html" class="material-icons back-icon">arrow_back</a>
                <h1 class="app-title">Memoria</h1>
            </div>
        </header>

        <div id="splash" class="splash-screen">
            <span class="material-icons" style="font-size: 80px; color: var(--primary-color); margin-bottom: 20px;">style</span>
            <h2>Niveles</h2>
            <div id="levels-grid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 25px; max-height: 350px; overflow-y: auto; padding: 5px; width: 100%; max-width: 350px;"></div>
        </div>

        <main class="game-area" id="main-game" style="display: none;">
            <div class="board" id="board"></div>
            <button class="btn-premium" onclick="initGame()" style="padding: 10px 30px;">REINICIAR</button>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/ui-manager.js"></script>
    <script src="../../js/game-manager.js"></script>
    <script src="script.js"></script>
    <script>
        const grid = document.getElementById('levels-grid');
        const unlocked = GameManager.getUnlockedLevel();
        const completed = JSON.parse(localStorage.getItem(`completed_${Auth.currentUser?.username}_memory`) || '[]');
        for (let i = 1; i <= 50; i++) {
            const isLocked = i > unlocked;
            const isDone = completed.includes(i);
            const btn = document.createElement('button');
            btn.className = 'lvl-btn-mini';
            btn.style.cssText = `padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: ${isLocked ? '#f5f5f5' : (isDone ? '#e8f5e9' : 'white')}; cursor: ${isLocked ? 'default' : 'pointer'}; position: relative; font-weight: bold; color: ${isLocked ? '#999' : '#333'}`;
            btn.innerHTML = `${i}${isLocked ? '<span class="material-icons" style="font-size: 12px; position: absolute; top: 2px; right: 2px;">lock</span>' : ''}${isDone ? '<span class="material-icons" style="font-size: 12px; position: absolute; bottom: 2px; right: 2px; color: #4caf50;">star</span>' : ''}`;
            if (!isLocked) btn.onclick = () => startGame(i);
            grid.appendChild(btn);
        }

        if (sessionStorage.getItem('autostart_memory') === 'true') {
            sessionStorage.removeItem('autostart_memory');
            startGame(GameManager.currentLevel);
        }

        function startGame(l) {
            GameManager.currentLevel = l;
            localStorage.setItem(`level_${Auth.currentUser.username}_memory`, l);
            document.getElementById('splash').style.display = 'none';
            document.getElementById('main-game').style.display = 'flex';
            initGame();
        }
    </script>
</body>
</html>
