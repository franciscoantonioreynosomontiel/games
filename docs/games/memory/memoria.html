<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria - GameHub</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .game-area { padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .board {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            gap: 10px;
            margin: 20px 0;
        }
        .card {
            width: 80px;
            height: 80px;
            perspective: 1000px;
            cursor: pointer;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card.matched { visibility: hidden; pointer-events: none; }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .card-front { background: var(--primary-color); color: white; }
        .card-back { background: white; transform: rotateY(180deg); color: #333; border: 2px solid var(--primary-color); }
        .card-back img { width: 70%; height: 70%; object-fit: contain; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="../../index.html" class="material-icons back-icon">arrow_back</a>
                <h1 class="app-title">Memoria</h1>
            </div>
        </header>

        <div id="splash" class="splash-screen">
            <span class="material-icons" style="font-size: 80px; color: var(--primary-color); margin-bottom: 20px;">style</span>
            <h2>Memoria</h2>
            <div class="level-grid" style="grid-template-columns: repeat(3, 1fr);">
                <!-- Levels will be injected by script if needed, or static for simplicity -->
                <button class="btn-premium" onclick="startGame(1)">Nivel 1</button>
                <button class="btn-premium" onclick="startGame(2)">Nivel 2</button>
                <button class="btn-premium" onclick="startGame(3)">Nivel 3</button>
            </div>
            <p style="margin-top: 20px; color: #666;">Selecciona un nivel para comenzar.</p>
        </div>

        <main class="game-area" id="main-game" style="display: none;">
            <div class="board" id="board"></div>
            <button class="btn-premium" onclick="initGame()" style="padding: 10px 30px;">REINICIAR</button>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/ui-manager.js"></script>
    <script src="../../js/game-manager.js"></script>
    <script src="script.js"></script>
    <script>
        function startGame(l) {
            GameManager.currentLevel = l;
            document.getElementById('splash').style.display = 'none';
            document.getElementById('main-game').style.display = 'flex';
            initGame();
        }
    </script>
</body>
</html>
