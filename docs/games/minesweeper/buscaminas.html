<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscaminas - GameHub</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .game-area { padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .mines-board {
            display: grid; background: #9e9e9e; padding: 4px; gap: 2px;
            border: 4px solid #444; border-radius: 4px; margin: 15px 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .cell {
            background: #bdbdbd; display: flex; align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer; user-select: none; font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .cell.revealed { background: #e0e0e0; border: 1px solid #ccc; }
        .cell.mine { background: #f44336; color: white; }
        .n1 { color: blue; } .n2 { color: green; } .n3 { color: red; } .n4 { color: darkblue; }

        .controls { display: flex; flex-direction: column; gap: 10px; align-items: center; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="../../index.html" class="material-icons back-icon">arrow_back</a>
                <h1 class="app-title">Buscaminas</h1>
            </div>
        </header>

        <div id="splash" class="splash-screen">
            <span class="material-icons" style="font-size: 80px; color: var(--primary-color); margin-bottom: 20px;">dangerous</span>
            <h2>Dificultad</h2>
            <div class="level-grid" id="diff-grid">
                <!-- Injected -->
            </div>
        </div>

        <main class="game-area" id="main-game" style="display: none;">
            <div style="font-weight: bold; margin-bottom: 5px;">Minas: <span id="mine-count">0</span></div>
            <div class="mines-board" id="board"></div>
            <button class="btn-premium" onclick="initGame()" style="padding: 10px 40px;">REINICIAR</button>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/ui-manager.js"></script>
    <script src="../../js/game-manager.js"></script>
    <script src="script.js"></script>
    <script>
        GameManager.currentGame = 'minesweeper';
        const modes = [
            { id: 'easy', name: 'Principiante (8x8)', s: 8, m: 10 },
            { id: 'medium', name: 'Intermedio (10x10)', s: 10, m: 20 },
            { id: 'hard', name: 'Experto (12x12)', s: 12, m: 35 }
        ];
        const grid = document.getElementById('diff-grid');
        modes.forEach(m => {
            const isDone = GameManager.isCompleted(m.id);
            const btn = document.createElement('button');
            btn.className = 'btn-premium';
            btn.innerHTML = `${m.name}${isDone ? ' <span class="material-icons" style="font-size: 16px; vertical-align: middle;">star</span>' : ''}`;
            btn.onclick = () => startGame(m.s, m.m, m.id);
            grid.appendChild(btn);
        });

        function startGame(s, m, id) {
            size = s;
            mines = m;
            document.getElementById('splash').style.display = 'none';
            document.getElementById('main-game').style.display = 'flex';
            GameManager.setGame('minesweeper', false, id.toUpperCase());
            initGame();
        }
    </script>
</body>
</html>
