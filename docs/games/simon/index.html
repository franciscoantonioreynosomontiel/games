<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon - GameHub</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="../../index.html" class="material-icons back-icon">arrow_back</a>
                <h1 class="app-title">Simon</h1>
            </div>
        </header>

        <main class="game-area">
            <div class="game-info">
                <div class="info-box">Nivel: <span id="level">0</span></div>
                <button id="start-btn">Comenzar</button>
            </div>

            <div class="simon-board">
                <div class="pad green" id="green" data-id="0"></div>
                <div class="pad red" id="red" data-id="1"></div>
                <div class="pad yellow" id="yellow" data-id="2"></div>
                <div class="pad blue" id="blue" data-id="3"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
