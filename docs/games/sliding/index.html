<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rompecabezas - GameHub</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .board {
            display: grid;
            gap: 4px;
            background: #eee;
            padding: 8px;
            border-radius: 12px;
            margin: 20px 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .tile {
            background: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            user-select: none;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 0 var(--primary-variant);
        }
        .tile:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--primary-variant); }
        .tile.empty {
            background: #ddd;
            cursor: default;
            box-shadow: none;
        }
        .stats {
            font-size: 1.1rem;
            font-weight: 500;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="../../index.html" class="material-icons back-icon">arrow_back</a>
                <h1 class="app-title">Rompecabezas</h1>
            </div>
        </header>

        <!-- Splash -->
        <div id="splash" class="splash-screen">
            <span class="material-icons" style="font-size: 80px; color: var(--primary-color); margin-bottom: 20px;">grid_view</span>
            <h2>Rompecabezas</h2>
            <div class="level-grid">
                <button class="btn-premium" onclick="startGame(3)">Fácil (3x3)</button>
                <button class="btn-premium" onclick="startGame(4)">Medio (4x4)</button>
                <button class="btn-premium" onclick="startGame(5)">Difícil (5x5)</button>
            </div>
        </div>

        <main class="game-area" id="main-game" style="display: none;">
            <div class="stats">Movimientos: <span id="move-count">0</span></div>
            <div class="board" id="board"></div>
            <button id="reset-btn" class="btn-premium" onclick="initGame()">REINICIAR</button>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/ui-manager.js"></script>
    <script src="../../js/game-manager.js"></script>
    <script src="script.js"></script>
    <script>
        function startGame(s) {
            size = s;
            document.getElementById('splash').style.display = 'none';
            document.getElementById('main-game').style.display = 'flex';
            initGame();
        }
    </script>
</body>
</html>
