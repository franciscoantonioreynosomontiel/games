<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rompecabezas - GameHub</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link href="../../lib/fonts/material-icons.css" rel="stylesheet">
    <style>
        .game-area { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .board { display: grid; gap: 4px; background: #eee; padding: 8px; border-radius: 12px; margin: 20px 0; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .tile { background: var(--primary-color); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: bold; cursor: pointer; border-radius: 8px; user-select: none; transition: transform 0.1s; box-shadow: 0 4px 0 var(--primary-variant); }
        .tile:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--primary-variant); }
        .tile.empty { background: #ddd; cursor: default; box-shadow: none; }
        .stats { font-size: 1.1rem; font-weight: bold; color: #444; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="../../index.html" class="material-icons back-icon">arrow_back</a>
                <h1 class="app-title">Rompecabezas</h1>
            </div>
        </header>

        <div id="splash" class="splash-screen">
            <span class="material-icons" style="font-size: 80px; color: var(--primary-color); margin-bottom: 20px;">grid_view</span>
            <h2>Dificultad</h2>
            <div class="level-grid" id="diff-grid">
                <!-- Injected -->
            </div>
        </div>

        <main class="game-area" id="main-game" style="display: none;">
            <div class="stats">Movimientos: <span id="move-count">0</span></div>
            <div class="board" id="board"></div>
            <button id="reset-btn" class="btn-premium" onclick="initGame()" style="padding: 10px 40px;">REINICIAR</button>
        </main>
    </div>

    <script src="../../lib/supabase.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/ui-manager.js"></script>
    <script src="../../js/game-manager.js"></script>
    <script src="script.js"></script>
    <script>
        GameManager.currentGame = 'sliding';
        const modes = [
            { id: '3', name: '3x3 Fácil' },
            { id: '4', name: '4x4 Medio' },
            { id: '5', name: '5x5 Difícil' }
        ];
        const grid = document.getElementById('diff-grid');
        modes.forEach(m => {
            // Check completed by difficulty key
            const isDone = GameManager.isCompleted(m.id + 'x' + m.id);
            const btn = document.createElement('button');
            btn.className = 'btn-premium';
            btn.innerHTML = `${m.name}${isDone ? ' <span class="material-icons" style="font-size: 16px; vertical-align: middle;">star</span>' : ''}`;
            btn.onclick = () => startGame(parseInt(m.id));
            grid.appendChild(btn);
        });

        function startGame(s) {
            size = s;
            document.getElementById('splash').style.display = 'none';
            document.getElementById('main-game').style.display = 'flex';
            initGame();
        }
    </script>
</body>
</html>
