<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku - GameHub</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="../../index.html" class="material-icons back-icon">arrow_back</a>
                <h1 class="app-title">Sudoku</h1>
            </div>
        </header>

        <main class="game-area">
            <!-- Level Selector Splash -->
            <div id="level-selector" class="splash-screen">
                <h2>Elige tu desafío</h2>
                <div class="level-grid">
                    <button class="lvl-btn" data-mode="classic" data-diff="easy">Clásico - Fácil</button>
                    <button class="lvl-btn" data-mode="classic" data-diff="medium">Clásico - Medio</button>
                    <button class="lvl-btn" data-mode="classic" data-diff="hard">Clásico - Difícil</button>
                    <button class="lvl-btn mega" data-mode="mega" data-diff="medium">Mega Sudoku (16x16)</button>
                </div>
            </div>

            <!-- Game Board (hidden initially) -->
            <div id="game-board" style="display: none; width: 100%; flex-direction: column; align-items: center;">
                <div class="game-controls">
                    <div class="info-box" id="mode-display">Clásico</div>
                    <button id="new-game">Nuevo</button>
                </div>

                <div class="sudoku-board" id="sudoku-board"></div>

                <div class="number-pad" id="numpad"></div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/ui-manager.js"></script>
    <script src="../../js/game-manager.js"></script>
    <script src="script.js"></script>
</body>
</html>
