<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe - GameHub</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .game-area { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 90px);
            grid-template-rows: repeat(3, 90px);
            gap: 10px;
            margin: 20px 0;
        }
        .cell {
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.2s;
        }
        .cell:active { transform: scale(0.95); }
        .cell.x { color: #f44336; }
        .cell.o { color: #2196f3; }
        .cell.winner { background: #e8f5e9; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="../../index.html" class="material-icons back-icon">arrow_back</a>
                <h1 class="app-title">Tres en Raya</h1>
            </div>
        </header>

        <!-- Splash -->
        <div id="splash" class="splash-screen">
            <span class="material-icons" style="font-size: 80px; color: var(--primary-color); margin-bottom: 20px;">close</span>
            <h2>Tres en Raya</h2>
            <div class="level-grid">
                <button class="btn-premium" onclick="startMode('pva', 'easy')">Fácil (IA)</button>
                <button class="btn-premium" onclick="startMode('pva', 'hard')">Experto (IA)</button>
                <button class="btn-premium" style="background: #03dac6; color: black;" onclick="startMode('pvp')">2 Jugadores</button>
            </div>
        </div>

        <main class="game-area" id="main-game" style="display: none;">
            <div id="status" style="font-weight: bold; font-size: 1.2rem;">Turno: X</div>
            <div class="board" id="board">
                <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
            </div>
            <button class="btn-premium" onclick="resetGame()">REINICIAR</button>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/ui-manager.js"></script>
    <script src="../../js/game-manager.js"></script>
    <script src="script.js"></script>
    <script>
        function startMode(m, d) {
            gameMode = m;
            difficulty = d || 'easy';
            document.getElementById('splash').style.display = 'none';
            document.getElementById('main-game').style.display = 'flex';
            resetGame();
        }
    </script>
</body>
</html>
