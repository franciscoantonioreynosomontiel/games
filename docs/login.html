<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="lib/fonts/roboto.css" rel="stylesheet">
    <link href="lib/fonts/material-icons.css" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-box animated zoomIn">
        <div class="form-container">
            <div class="form-group">
                <label for="username">Usuario</label>
                <div class="input-with-icon">
                    <span class="material-icons">person</span>
                    <input type="text" id="username">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-with-icon">
                    <span class="material-icons">lock</span>
                    <input type="password" id="password">
                </div>
            </div>

            <button id="login-btn" class="btn-primary login-submit">
                <span>ENTRAR</span>
                <span class="material-icons">arrow_forward</span>
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="lib/supabase.js"></script>
    <script src="js/config.js"></script>
    <script src="js/ui-manager.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (Auth.isLoggedIn()) {
                window.location.href = 'index.html';
            }

            document.getElementById('login-btn').addEventListener('click', async () => {
                const user = document.getElementById('username').value;
                const pass = document.getElementById('password').value;

                try {
                    const btn = document.getElementById('login-btn');
                    btn.disabled = true;
                    btn.innerText = 'Cargando...';

                    await Auth.login(user, pass);
                    window.location.href = 'index.html';
                } catch (e) {
                    UIManager.alert('Error', e.message, 'error');
                    const btn = document.getElementById('login-btn');
                    btn.disabled = false;
                    btn.innerHTML = '<span>ENTRAR</span><span class="material-icons">arrow_forward</span>';
                }
            });

            document.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') document.getElementById('login-btn').click();
            });
        });
    </script>
</body>
</html>
