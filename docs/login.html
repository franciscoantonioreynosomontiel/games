<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GameHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="login-page">
    <div class="app-container login-container">
        <div class="login-box animated zoomIn">
            <div class="brand">
                <span class="material-icons brand-icon">videogame_asset</span>
                <h1>GameHub</h1>
                <p>Tu arcade de bolsillo</p>
            </div>

            <div class="form-container">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <div class="input-with-icon">
                        <span class="material-icons">person</span>
                        <input type="text" id="username" placeholder="Ingresa tu usuario">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-with-icon">
                        <span class="material-icons">lock</span>
                        <input type="password" id="password" placeholder="Ingresa tu contraseña">
                    </div>
                </div>

                <button id="login-btn" class="btn-primary login-submit">
                    <span>ENTRAR</span>
                    <span class="material-icons">arrow_forward</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/ui-manager.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (Auth.isLoggedIn()) {
                window.location.href = 'index.html';
            }

            document.getElementById('login-btn').addEventListener('click', async () => {
                const user = document.getElementById('username').value;
                const pass = document.getElementById('password').value;

                try {
                    const btn = document.getElementById('login-btn');
                    btn.disabled = true;
                    btn.innerText = 'Cargando...';

                    await Auth.login(user, pass);
                    window.location.href = 'index.html';
                } catch (e) {
                    UIManager.alert('Error', e.message, 'error');
                    const btn = document.getElementById('login-btn');
                    btn.disabled = false;
                    btn.innerHTML = '<span>ENTRAR</span><span class="material-icons">arrow_forward</span>';
                }
            });

            // Enter key support
            document.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') document.getElementById('login-btn').click();
            });
        });
    </script>
</body>
</html>
