<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puntajes - GameHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <a href="index.html" class="material-icons back-icon">arrow_back</a>
                <h1 class="app-title">Salón de la Fama</h1>
            </div>
        </header>

        <main class="content-area">
            <div class="tabs">
                <button class="tab-btn active" data-tab="global">Global</button>
                <button class="tab-btn" data-tab="personal">Mi Historial</button>
            </div>

            <div id="scores-content" class="scores-list animated fadeInUp">
                <div style="text-align:center; padding: 40px; color: #999;">Cargando puntajes...</div>
            </div>
        </main>

        <footer class="app-footer">
            <nav class="bottom-nav">
                <div class="nav-item" onclick="location.href='index.html'"><span class="material-icons">home</span><span>Inicio</span></div>
                <div class="nav-item active" onclick="location.href='scores.html'"><span class="material-icons">emoji_events</span><span>Puntajes</span></div>
                <div class="nav-item" id="admin-nav" style="display: none;" onclick="location.href='admin.html'"><span class="material-icons">admin_panel_settings</span><span>Admin</span></div>
            </nav>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/ui-manager.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }

            if (Auth.isAdmin()) {
                document.getElementById('admin-nav').style.display = 'flex';
            }

            const content = document.getElementById('scores-content');
            const tabs = document.querySelectorAll('.tab-btn');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    loadScores(tab.dataset.tab);
                });
            });

            async function loadScores(type) {
                content.innerHTML = '<div style="text-align:center; padding: 40px; color: #999;">Cargando...</div>';
                try {
                    let res;
                    if (type === 'global') {
                        res = await window.appConfig.supabase
                            .from('game_scores')
                            .select('*, app_users(username)')
                            .order('score', { ascending: false })
                            .limit(30);
                    } else {
                        res = await window.appConfig.supabase
                            .from('game_scores')
                            .select('*, app_users(username)')
                            .eq('user_id', Auth.currentUser.id)
                            .order('created_at', { ascending: false })
                            .limit(30);
                    }

                    if (res.error) throw res.error;
                    renderScores(res.data);
                } catch (e) {
                    console.error(e);
                    content.innerHTML = '<p style="text-align:center; color: red; padding: 20px;">Error al cargar datos</p>';
                }
            }

            function renderScores(scores) {
                if (!scores || scores.length === 0) {
                    content.innerHTML = '<p style="text-align:center; color: #999; padding: 40px;">No hay registros aún</p>';
                    return;
                }

                content.innerHTML = scores.map(s => `
                    <div class="score-item">
                        <div class="score-info">
                            <span class="game-tag">${s.game_id.toUpperCase()}</span>
                            <span class="user-name">${s.app_users?.username || 'Usuario'}</span>
                            <span class="date">${new Date(s.created_at).toLocaleDateString()}</span>
                        </div>
                        <div class="score-value">
                            <strong>${s.score} pts</strong>
                            <span style="font-size: 11px; color: #666;">${s.difficulty ? s.difficulty : 'Nivel ' + s.level}</span>
                        </div>
                    </div>
                `).join('');
            }

            loadScores('global');
        });
    </script>
</body>
</html>
